name: Node.js CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"
      # Step 3: Create .env file
      - name: Create .env file
        run: |
          echo "API_URL=${{ secrets.API_URL }}" >> .env
          echo "DB_URL=${{ secrets.DB_URL }}" >> .env
      # Step 4: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step 5: Start server (waits for completion)
      - name: Start server
        env:
          PORT: 5050
        run: |
          npm start &
          sleep 10  # Ensure the server is up and running
          curl -f http://159.89.164.11:5050/api/v1/user || exit 1  # Check if the server is responding

  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Set up Node.js environment
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      # Step 3: Install sshpass
      - name: Install sshpass
        run: sudo apt-get update && sudo apt-get install -y sshpass

      # Step 4: Ensure package-lock.json exists (if missing)
      - name: Ensure package-lock.json exists
        run: |
          if [ ! -f package-lock.json ]; then
            npm install --package-lock-only
          fi

      # Step 6: Deploy the application (install pm2 on the remote server)
      - name: Deploy to server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          API_URL: ${{ secrets.API_URL }}
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
        run: |
          echo "Deploying to server..."
          sshpass -p "$SSH_PASSWORD" ssh -o StrictHostKeyChecking=no $SSH_USER@$SSH_HOST << 'EOF'
          cd /home/Taxiride-backend
          git pull
          npm install
          # Install pm2 globally on the remote server if not installed
          if ! command -v pm2 &> /dev/null; then
            npm install -g pm2
          fi
          pm2 restart 17 || (echo "PM2 restart failed." && exit 1)
          EOF
